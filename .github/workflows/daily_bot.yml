name: Daily Trading Bot

on:
  schedule:
    - cron: '45 13 * * 1-5'  # 9:45am ET weekdays (works EDT + EST)
  workflow_dispatch:           # manual trigger button in GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Run trading bot
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
        run: uv run python scripts/run_live.py

      - name: Commit log file
        run: |
          git config user.name "trading-bot"
          git config user.email "bot@backtest-engine"
          git add results/live_log_*.json
          git diff --staged --quiet || git commit -m "bot: daily run $(date +%Y-%m-%d)"
          git push
